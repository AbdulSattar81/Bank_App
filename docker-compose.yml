services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Test@123
      MYSQL_DATABASE: bankappdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "localhost", "-u", "root", "-pTest@123"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bankapp-nw
    ports:
      - "3606:3606"

  bankapp:
    build: .
    container_name: bankapp
    ports:
      - "8080:8080"   
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb
      MYSQL_USER: root
      MYSQL_PASSWORD: Test@123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bankapp-nw
   

networks:
  bankapp-nw:
    driver: bridge
  
volumes:
  mysql-data:
